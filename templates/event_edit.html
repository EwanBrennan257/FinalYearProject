{% extends "base.html" %}
{% block title %}Edit Event - Cork Photographers{% endblock %}

{% block content %}
<h2>Edit Event</h2>

<div class="card mb-4">
  <div class="card-body">
    <form method="post" action="{{ url_for('events.event_edit', event_id=event.id) }}">
      <div class="form-group">
        <label for="title">Event Title</label>
        <input type="text" id="title" name="title" class="form-control" maxlength="200" value="{{ event.title }}" required>
      </div>

      <div class="form-group">
        <label for="description">Description (optional)</label>
        <textarea id="description" name="description" class="form-control" rows="4" maxlength="2000">{{ event.description or '' }}</textarea>
      </div>

      <div class="form-row">
        <div class="form-group col-md-6">
          <label for="event_date">Date</label>
          <input type="date" id="event_date" name="event_date" class="form-control" value="{{ event.event_date.isoformat() }}" required>
        </div>

        <div class="form-group col-md-6">
          <label for="event_time">Start Time (optional)</label>
          <input type="time" id="event_time" name="event_time" class="form-control" value="{{ event.event_time.strftime('%H:%M') if event.event_time else '' }}">
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('events.event_detail', event_id=event.id) }}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>

{% endblock %}
