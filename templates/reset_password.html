{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<h2 class="mb-3">Set a new password</h2>

{% if message %}
  <div class="alert alert-warning">{{ message }}</div>
{% endif %}

<form method="post" action="{{ url_for('reset_password', token=token) }}">
  <div class="form-group">
    <label>New Password</label>
    <input class="form-control" type="password" name="password" required placeholder="At least 6 characters">
  </div>

  <div class="form-group">
    <label>Confirm New Password</label>
    <input class="form-control" type="password" name="confirm_password" required placeholder="Type your password again">
  </div>

  <button class="btn btn-primary" type="submit">Reset Password</button>
</form>
{% endblock %}
