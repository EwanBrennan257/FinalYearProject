{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<h2 class="mb-3">Forgot your password?</h2>
<p class="text-muted">Enter your email and we'll send you a link to reset your password.</p>

{% if message %}
  <div class="alert alert-warning">{{ message }}</div>
{% endif %}

<form method="post" action="{{ url_for('forgot_password') }}">
  <div class="form-group">
    <label>Email</label>
    <input class="form-control" type="email" name="email" required placeholder="Enter your email address">
  </div>

  <button class="btn btn-primary" type="submit">Send Reset Link</button>
  <a href="{{ url_for('login') }}" class="btn btn-outline-secondary ml-2">Back to Login</a>
</form>
{% endblock %}
