{% extends "base.html" %}
{% block title %}Edit Visit - Cork Photographers{% endblock %}

{% block content %}

<div class="blog-post">
  <h2>Edit your visit</h2>
  <p class="text-muted">
    Location: <a href="{{ url_for('location_detail', slug=visit.location.slug) }}">{{ visit.location.name }}</a>
  </p>

  <div class="card mb-3">
    <div class="card-body">
      <form method="post" action="{{ url_for('edit_visit', visit_id=visit.id) }}">
        <div class="form-group">
          <label for="visited_date">Date visited</label>
          <input type="date" id="visited_date" name="visited_date" class="form-control" value="{{ visit.visited_date.isoformat() }}" required>
        </div>

        <div class="form-group">
          <label for="note">Personal note (optional)</label>
          <textarea id="note" name="note" class="form-control" rows="4" maxlength="1000">{{ visit.note or '' }}</textarea>
        </div>

        <button class="btn btn-primary" type="submit">Save changes</button>
        <a href="{{ url_for('location_detail', slug=visit.location.slug) }}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>

{% endblock %}
