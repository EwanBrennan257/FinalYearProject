{% extends "base.html" %}
{% block title %}Create Event - Cork Photographers{% endblock %}

{% block content %}
<h2>Create a Community Event</h2>

<div class="card mb-4">
  <div class="card-body">
    <form method="post" action="{{ url_for('events.events_create') }}">
      <div class="form-group">
        <label for="title">Event Title</label>
        <input type="text" id="title" name="title" class="form-control" maxlength="200" placeholder="e.g., Sunset Photography at Cobh" required>
      </div>

      <div class="form-group">
        <label for="description">Description (optional)</label>
        <textarea id="description" name="description" class="form-control" rows="4" maxlength="2000" placeholder="What's the plan? What should people bring?"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group col-md-6">
          <label for="event_date">Date</label>
          <input type="date" id="event_date" name="event_date" class="form-control" required>
        </div>

        <div class="form-group col-md-6">
          <label for="event_time">Start Time (optional)</label>
          <input type="time" id="event_time" name="event_time" class="form-control">
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Create Event</button>
      <a href="{{ url_for('events.events_list') }}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>

{% endblock %}
