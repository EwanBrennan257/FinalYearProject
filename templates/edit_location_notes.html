{% extends "base.html" %}
{% block title %}Edit Notes - {{ location.name }}{% endblock %}

{% block content %}
<div class="blog-post">
  <h2>Edit Notes</h2>
  <p class="text-muted">
    Location: <a href="{{ url_for('location_detail', slug=location.slug) }}">{{ location.name }}</a>
  </p>

  <div class="card mb-3">
    <div class="card-body">
      <form method="post" action="{{ url_for('edit_location_notes', slug=location.slug) }}">
        <div class="form-group">
          <label for="notes">Location Notes</label>
          <textarea id="notes" name="notes" class="form-control" rows="4" maxlength="400" 
                    placeholder="Add notes about this location (e.g. best time to visit, parking info, tips)">{{ location.notes or '' }}</textarea>
          <small class="form-text text-muted">Max 400 characters</small>
        </div>

        <button class="btn btn-primary" type="submit">Save Notes</button>
        <a href="{{ url_for('location_detail', slug=location.slug) }}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
