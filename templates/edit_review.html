{% extends "base.html" %}
{% block title %}Edit Review - Cork Photographers{% endblock %}

{% block content %}

<div class="blog-post">
  <h2 class="blog-post-title">Edit your review</h2>
  <p class="text-muted">
    For: <a href="{{ url_for('location_detail', slug=review.location.slug) }}">{{ review.location.name }}</a>
  </p>

  <div class="card mb-3">
    <div class="card-body">
      <form method="post" action="{{ url_for('edit_review', review_id=review.id) }}">
        <div class="form-group">
          <label>Rating</label>
          <div>
            {% for n in range(5, 0, -1) %}
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="rating"
                       id="rating{{ n }}" value="{{ n }}"
                       {% if review.rating == n %}checked{% endif %} required>
                <label class="form-check-label" for="rating{{ n }}">{{ n }}★</label>
              </div>
            {% endfor %}
          </div>
        </div>

        <div class="form-group">
          <label for="body">Comment</label>
          <textarea id="body" name="body" class="form-control" maxlength="1000" rows="4" required>{{ review.body }}</textarea>
        </div>

        <button class="btn btn-primary" type="submit">Save changes</button>
        <a href="{{ url_for('location_detail', slug=review.location.slug) }}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>

{% endblock %}
